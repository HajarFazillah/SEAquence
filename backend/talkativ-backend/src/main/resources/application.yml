spring:
  datasource:
    url: jdbc:mysql://localhost:3307/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true
        "[connection.characterEncoding]": UTF-8
        "[connection.useUnicode]": true

  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

  config:
    import: optional:file:.env[.properties]